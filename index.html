<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浙江初中刷题打卡 - 云同步版 v2</title>

    <link rel="stylesheet" href="css/user.css">
    <link rel="stylesheet" href="css/badge.css">
    <style>
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity .5s}
    .loading-content{text-align:center;color:#fff}
    .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#f8d7da;color:#721c24;padding:15px 25px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:10000;max-width:90%;text-align:center}
    .user-avatar-img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #fff}
    .user-avatar-small{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #e0e0e0}
    </style>
</head>
<body>
    <div id="loading"><div class="loading-content"><div class="spinner"></div><div id="load-status">🚀 正在加载...</div></div></div>

    <div id="app">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <div class="header">
                <div class="header-user">
                    <button class="user-switch-btn" onclick="showUserManager()">
                        <img class="user-avatar-img" id="current-user-avatar" src="" alt="" style="display:none;" />

                        <span class="user-name" id="current-username">加载中...</span>
                        <span class="user-arrow">▼</span>
                    </button>
                </div>
                <h1>📚 浙江初中刷题打卡</h1>
                <p class="subtitle">云同步版</p>
            </div>
            
            <div class="grade-selector">
                <h2>选择学期</h2>
                <div class="semester-buttons">
                    <button class="semester-btn" data-sem="upper">上册</button>
                    <button class="semester-btn selected" data-sem="lower">下册</button>
                </div>
            </div>
            
            <div style="text-align:center;margin:20px 0;">
                <button class="grade-btn" style="width:100%;padding:15px;font-size:16px;" onclick="startPractice()">直接开始今日练习</button>
            </div>
            
            <div class="stats-preview">
                <h3>📊 学习统计</h3>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-value" id="stat-days">0</div><div class="stat-label">打卡天数</div></div>

                    <div class="stat-item"><div class="stat-value" id="stat-correct">0%</div><div class="stat-label">正确率</div></div>
                </div>
            </div>
            
            <div class="quick-access">
                <h2>🚀 快捷入口</h2>
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="showPage('wrong')">
                        <span class="quick-icon">📝</span>
                        <span class="quick-text">错题本</span>
                        <span class="quick-count" id="wrong-count" style="display:none">0</span>
                    </button>
                    <button class="quick-btn" onclick="showPage('history')">
                        <span class="quick-icon">📅</span>

        <!-- 练习页 -->

                <button class="filter-btn" onclick="renderWrongList('数学')">数学</button>
                <button class="filter-btn" onclick="renderWrongList('英语')">英语</button>

        <!-- 用户管理 -->

            </div>
            <div class="user-manager">

                    <div class="add-user-form">

                    <h3>👥 用户列表</h3>
                    <div class="user-list" id="user-list"></div>

            <div class="avatar-upload-section" style="margin-top:20px;padding:20px;background:#f8f9fa;border-radius:12px;">

    <!-- ============ 核心代码 - 内联加载，避免依赖问题 ============ -->
    <script>
    (function(){
        'use strict';
        
        // 1. 配置 - 直接内嵌，不依赖外部文件
        window.SUPABASE_CONFIG = {
            url: 'https://ykdrfaxnskddeadjelfo.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZHJmYXhuc2tkZGVhZGplbGZvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTA4MTI0NywiZXhwIjoyMDkwNjU3MjQ3fQ.FuQ6M2DBLn58xOaZCZAGNlxAF02aPUlOnQSLk8YtKuU'
        };
        console.log('✅ Config loaded');
        
        // 2. Supabase 轻量客户端
        class SupabaseClient {
            constructor(url, key) {
                this.url = url.replace(/\/$/, '');
                this.headers = {
                    'apikey': key,
                    'Authorization': 'Bearer ' + key,
                    'Content-Type': 'application/json'
                };
            }
            async query(table, opts = {}) {
                const params = new URLSearchParams();
                if (opts.eq) Object.entries(opts.eq).forEach(([k,v]) => params.append(k, 'eq.' + v));
                params.append('select', opts.select || '*');
                if (opts.order) params.append('order', opts.order.column + '.' + (opts.order.ascending ? 'asc' : 'desc'));
                const res = await fetch(this.url + '/rest/v1/' + table + '?' + params, { headers: this.headers });
                if (!res.ok) { return { data: null, error: { message: res.status } }; }
                try { return { data: await res.json(), error: null }; } catch(e) { return { data: [], error: null }; }
            }
            async insert(table, data) {
                const res = await fetch(this.url + '/rest/v1/' + table, {
                    method: 'POST',
                    headers: { ...this.headers, 'Prefer': 'return=representation' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) { return { data: null, error: { message: res.status } }; }
                try { return { data: await res.json(), error: null }; } catch(e) { return { data: [], error: null }; }
            }
            async delete(table, id) {
                const res = await fetch(this.url + '/rest/v1/' + table + '?id=eq.' + id, { method: 'DELETE', headers: this.headers });
                return { data: res.ok, error: res.ok ? null : {} };
            }
            async deleteAll(table, filters) {
                const params = new URLSearchParams();
                Object.entries(filters).forEach(([k,v]) => params.append(k, 'eq.' + v));
                const res = await fetch(this.url + '/rest/v1/' + table + '?' + params, { method: 'DELETE', headers: this.headers });
                return { data: res.ok, error: res.ok ? null : {} };
            }
            async update(table, id, data) {
                const res = await fetch(this.url + '/rest/v1/' + table + '?id=eq.' + id, { 
                    method: 'PATCH', 
                    headers: this.headers, 
                    body: JSON.stringify(data) 
                });
                if (!res.ok) {
                    try { return { data: null, error: { message: res.status } }; }
                    catch (ee) { return { data: null, error: { message: res.status + ' ' + res.statusText } }; }
                }
                try { try { return { data: await res.json(), error: null }; } catch(e) { return { data: [], error: null }; } }
                catch (e) { return { data: { success: true }, error: null }; }
            }
            async uploadAvatar(file, userId) {
                const fileName = userId + '_' + Date.now() + '.jpg';
                const uploadUrl = this.url + '/storage/v1/object/avatars/' + encodeURIComponent(fileName);
                console.log('📤 Uploading:', uploadUrl);
                
                const fetchRes = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: { 
                        'apikey': window.SUPABASE_CONFIG.key,
                        'Authorization': 'Bearer ' + window.SUPABASE_CONFIG.key,
                        'Content-Type': file.type || 'image/jpeg'
                    },
                    body: file
                });
                
                // 上传成功返回 200，但响应体可能为空
                if (fetchRes.status === 200 || fetchRes.status === 201) {
                    const publicUrl = this.url + '/storage/v1/object/public/avatars/' + encodeURIComponent(fileName);
                    console.log('✅ Upload success:', publicUrl);
                    return { data: { url: publicUrl, fileName: fileName }, error: null };
                }
                
                // 只有失败时才解析 JSON
                try {
                    const e = await fetchRes.json();
                    console.error('Upload error:', e);
                    return { data: null, error: new Error(e.message || 'Upload failed') };
                } catch (parseErr) {
                    return { data: null, error: new Error('上传失败，状态码：' + fetchRes.status) };
                }
            }
            async deleteAvatar(fileName) {
                return { data: true, error: null };
            }
        }
        
        let _client = null;
        window.initSupabase = function(url, key) {
            _client = new SupabaseClient(url, key);
            console.log('✅ Supabase client initialized:', url);
            return _client;
        };
        window.getSupabase = function() { return _client; };
        
        // 3. 存储模块
        window.Storage = {
            _client: null,
            async init() {
                if (!window.SUPABASE_CONFIG) throw new Error('Supabase config not found');
                this._client = window.initSupabase(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);
                console.log('✅ Storage initialized');
                return true;
            },
            getUid() { return sessionStorage.getItem('quiz_user'); },
            setUid(id) { sessionStorage.setItem('quiz_user', id); },
            async getUsers() { const r = await this._client.query('users', { order: { column: 'created_at', ascending: false } }); return r.data || []; },
            async createUser(name) {
                const id = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                await this._client.insert('users', { id, name, total_days: 0, total_questions: 0 });
                this.setUid(id);
                return { id, name };
            },
            async deleteUser(id) {
                await this._client.deleteAll('practice_history', { user_id: id });
                await this._client.deleteAll('wrong_questions', { user_id: id });
                await this._client.delete('users', id);
                if (this.getUid() === id) sessionStorage.removeItem('quiz_user');
            },
            async getStats() {
                const uid = this.getUid();
                if (!uid) return { totalDays: 0, totalQuestions: 0, totalCorrect: 0, accuracy: 0 };
                const r = await this._client.query('practice_history', { eq: { user_id: uid } });
                const h = r.data || [];
                const tq = h.reduce((s, x) => s + (x.total_questions || 0), 0);
                const tc = h.reduce((s, x) => s + (x.correct_count || 0), 0);
                return { totalDays: new Set(h.map(x => x.created_at?.split('T')[0])).size, totalQuestions: tq, totalCorrect: tc, accuracy: tq ? Math.round(tc / tq * 100) : 0 };
            },
            async addHistory(r) { await this._client.insert('practice_history', { id: 'h_' + Date.now(), user_id: this.getUid(), ...r }); },
            async addWrong(q, ua) {
                const uid = this.getUid();
                const ex = await this._client.query('wrong_questions', { eq: { user_id: uid, question_id: q.id } });
                if (ex.data && ex.data.length > 0) return null;
                await this._client.insert('wrong_questions', { id: 'w_' + Date.now(), user_id: uid, question_id: q.id, question: q.question, options: q.options, answer: q.answer, user_answer: ua, explanation: q.explanation, subject: q.subject, knowledge_point: q.knowledgePoint || '' });
            },
            async getWrongs() { const r = await this._client.query('wrong_questions', { eq: { user_id: this.getUid() }, order: { column: 'created_at', ascending: false } }); return r.data || []; },
            async delWrong(id) { await this._client.delete('wrong_questions', id); },
            async clearWrongs() { await this._client.deleteAll('wrong_questions', { user_id: this.getUid() }); },
            async getState() { const r = await this._client.query('practice_state', { eq: { user_id: this.getUid() } }); if (!r.data || r.data.length === 0) return null; const s = r.data[0]; return { grade: s.grade, semester: s.semester, questions: s.questions, currentIndex: s.current_index, userAnswers: s.user_answers, elapsedSeconds: s.elapsed_seconds }; },
            async saveState(s) {
                const uid = this.getUid();
                const ex = await this._client.query('practice_state', { eq: { user_id: uid } });
                const d = { id: 'st_' + uid, user_id: uid, grade: s.selectedGrade, semester: s.selectedSemester, questions: s.currentQuestions, current_index: s.currentIndex, user_answers: s.userAnswers, elapsed_seconds: s.elapsedSeconds };
                if (ex.data && ex.data.length > 0) await this._client.update('practice_state', 'st_' + uid, d); else await this._client.insert('practice_state', d);
            },
            async clearState() { await this._client.delete('practice_state', 'st_' + this.getUid()); },
            async uploadAvatar(file, userId) {
                console.log('🔧 Storage.uploadAvatar called');
                const r = await this._client.uploadAvatar(file, userId);
                if (r.error) {
                    console.error('Upload failed:', r.error);
                    throw r.error;
                }
                console.log('✅ Upload success, updating user...');
                await this._client.update('users', userId, { avatar_url: r.data.url });
                console.log('✅ User avatar updated');
                return r.data.url;
            },
            async removeAvatar(userId) {
                await this._client.update('users', userId, { avatar_url: null });
            },
            async getAvatar(userId) {
                const r = await this._client.query('users', { eq: { id: userId } });
                if (r.data && r.data.length > 0) return r.data[0].avatar_url;
                return null;
            }
        };
        
        console.log('✅ All core modules loaded');
    })();
    </script>

    <!-- 应用逻辑 -->
    <script>
    const app = {
        state: { sem: 'lower', questions: [], idx: 0, answers: [], selected: null, elapsed: 0 },
        semesters: { upper: '上册', lower: '下册' },
        selectedAvatarFile: null,
        
        async init() {
            console.log('🚀 App initializing...');
            try {
                await Storage.init();
                console.log('✅ Storage init done');
                await this.checkUser();
                console.log('✅ User check done');
                this.bindEvents();
                await this.updateStats();
                await this.updateWrongCount();
                await this.checkResume();
                console.log('✅ App init complete');
            } catch (e) {
                console.error('❌ Init error:', e);
                document.getElementById('load-status').textContent = '❌ 加载失败：' + e.message;
                setTimeout(() => {
                    const err = document.createElement('div');
                    err.className = 'error-box';
                    err.innerHTML = '<strong>❌ 初始化失败</strong><br>' + e.message + '<br><small>请检查控制台</small>';
                    document.body.appendChild(err);
                }, 1000);
            }
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 500);
        },
        
        async checkUser() {
            const users = await Storage.getUsers();
            console.log('Users:', users.length);
            if (users.length === 0) {
                await Storage.createUser('默认用户');
            }
            const uid = Storage.getUid();
            if (!uid || !users.find(u => u.id === uid)) Storage.setUid(users[0].id);
            const user = users.find(u => u.id === Storage.getUid());
            document.getElementById('current-username').textContent = user ? user.name : '未登录';
            if (user && user.avatar_url) {
                document.getElementById('current-user-avatar').src = user.avatar_url;
                document.getElementById('current-user-avatar').style.display = 'inline-block';
                document.getElementById('current-user-icon').style.display = 'none';
            } else {
                document.getElementById('current-user-avatar').style.display = 'none';
                document.getElementById('current-user-icon').style.display = 'inline-block';
            }
            console.log('Current user:', document.getElementById('current-username').textContent);
        },
        
        bindEvents() {
            document.querySelectorAll('.semester-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('.semester-btn').forEach(x => x.classList.remove('selected'));
                    b.classList.add('selected');
                    app.state.sem = b.dataset.sem;
                };
            });
        },
        
        async updateStats() {
            const s = await Storage.getStats();
            document.getElementById('stat-days').textContent = s.totalDays;
            document.getElementById('stat-total').textContent = s.totalQuestions;
            document.getElementById('stat-correct').textContent = s.accuracy + '%';
        },
        
        async updateWrongCount() {
            const ws = await Storage.getWrongs();
            const badge = document.getElementById('wrong-count');
            if (badge) {
                badge.textContent = ws.length;
                badge.style.display = ws.length > 0 ? 'inline-block' : 'none';
            }
        },
        
        async checkResume() {
            const st = await Storage.getState();
            if (st && st.questions && st.questions.length > 0 && confirm('继续未完成的练习？')) {
                app.state.questions = st.questions; app.state.idx = st.currentIndex; app.state.answers = st.userAnswers; app.state.elapsed = st.elapsedSeconds;
                showPage('practice'); startTimer(); renderQ();
            }
        },
        
        async startPractice() {
            const qs = getTodayQuestions(7, app.state.sem);
            if (!qs || qs.length === 0) return alert('题库加载失败');
            app.state.questions = qs; app.state.idx = 0; app.state.answers = []; app.state.selected = null; app.state.elapsed = 0;
            document.getElementById('practice-title').textContent = '七年级' + app.semesters[app.state.sem] + ' 每日打卡';
            showPage('practice'); startTimer(); renderQ();
        },
        
        showPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            if (p === 'wrong') { renderWrongList('all'); this.updateWrongCount(); }
            if (p === 'history') renderHistory();
        }
    };
    
    let timer = null;
    function startTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(async () => {
            app.state.elapsed++;
            const m = Math.floor(app.state.elapsed / 60).toString().padStart(2, '0');
            const s = (app.state.elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = m + ':' + s;
            if (document.getElementById('practice-page').classList.contains('active')) await Storage.saveState(app.state);
        }, 1000);
    }
    
    function renderQ() {
        const q = app.state.questions[app.state.idx];
        if (!q) return;
        document.getElementById('question-counter').textContent = (app.state.idx + 1) + '/' + app.state.questions.length;
        document.getElementById('subject-tag').textContent = q.subject;
        document.getElementById('subject-tag').className = 'subject-tag ' + q.subject.toLowerCase();
        document.getElementById('question-text').textContent = q.question;
        document.getElementById('options-container').innerHTML = q.options.map((o, i) => '<button class="option" data-idx="' + i + '" onclick="selectOpt(' + i + ')">' + String.fromCharCode(65 + i) + '. ' + o + '</button>').join('');
        document.getElementById('feedback').style.display = 'none';
        app.state.selected = null;
    }
    
    function selectOpt(i) {
        document.querySelectorAll('.option').forEach((b, idx) => b.classList.toggle('selected', idx === i));
        app.state.selected = i;
    }
    
    async function submitAnswer() {
        if (app.state.selected === null) return alert('请选择答案');
        const q = app.state.questions[app.state.idx];
        const ok = app.state.selected === q.answer;
        app.state.answers.push({ idx: app.state.idx, selected: app.state.selected, ok: ok, subject: q.subject });
        if (!ok) { await Storage.addWrong(q, app.state.selected); app.updateWrongCount(); }
        
        const fb = document.getElementById('feedback'), ic = document.getElementById('feedback-icon'), tx = document.getElementById('feedback-text'), ex = document.getElementById('explanation');
        fb.style.display = 'block'; fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
        ic.textContent = ok ? '✅' : '❌';
        tx.textContent = ok ? '回答正确！' : ('正确答案：' + String.fromCharCode(65 + q.answer));
        ex.textContent = q.explanation || '';
        
        if (app.state.idx >= app.state.questions.length - 1) setTimeout(complete, 1000);
    }
    
    function nextQuestion() {
        if (app.state.idx < app.state.questions.length - 1) { app.state.idx++; renderQ(); } else complete();
    }
    
    async function complete() {
        clearInterval(timer);
        const okCount = app.state.answers.filter(a => a.ok).length;
        const total = app.state.questions.length;
        const acc = Math.round(okCount / total * 100);
        await Storage.addHistory({ grade: 7, semester: app.state.sem, totalQuestions: total, correctCount: okCount, accuracy: acc, duration: app.state.elapsed, subjectStats: {}, questionIds: app.state.questions.map(q => q.id) });
        await Storage.clearState();
        
        document.getElementById('final-score').textContent = acc;
        document.getElementById('result-correct').textContent = okCount + '/' + total;
        document.getElementById('result-rate').textContent = acc + '%';
        document.getElementById('result-time').textContent = Math.floor(app.state.elapsed / 60).toString().padStart(2, '0') + ':' + (app.state.elapsed % 60).toString().padStart(2, '0');
        
        const sjs = {}; app.state.questions.forEach((q, i) => { if (!sjs[q.subject]) sjs[q.subject] = { t: 0, c: 0 }; sjs[q.subject].t++; if (app.state.answers[i]?.ok) sjs[q.subject].c++; });
        document.getElementById('subject-breakdown').innerHTML = '<h3>各科表现</h3>' + Object.entries(sjs).map(([n, d]) => '<div class="subject-stat"><span class="subject-name">' + n + '</span><span class="subject-score">' + d.c + '/' + d.t + ' (' + Math.round(d.c / d.t * 100) + '%)</span></div>').join('');
        app.showPage('complete');
        app.updateStats();
    }
    
    async function renderWrongList(f) {
        const ws = await Storage.getWrongs();
        const filtered = f === 'all' ? ws : ws.filter(w => w.subject === f);
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === (f === 'all' ? '全部' : f)));
        const c = document.getElementById('wrong-list');
        if (filtered.length === 0) { c.innerHTML = '<div class="empty-tip">暂无错题</div>'; document.getElementById('clear-wrong-btn').style.display = 'none'; return; }
        c.innerHTML = filtered.map(w => '<div class="wrong-item"><div class="wrong-header"><span class="wrong-subject ' + w.subject.toLowerCase() + '">' + w.subject + '</span><button class="wrong-delete" onclick="delWrong(\'' + w.id + '\')">删除</button></div><div class="wrong-question">' + w.question + '</div><div class="wrong-answer"><span>你的：' + String.fromCharCode(65 + w.user_answer) + '</span><span>正确：' + String.fromCharCode(65 + w.answer) + '</span></div><div class="wrong-explanation">' + (w.explanation || '') + '</div></div>').join('');
        document.getElementById('clear-wrong-btn').style.display = 'block';
        app.updateWrongCount();
    }
    
    async function delWrong(id) { await Storage.delWrong(id); renderWrongList('all'); app.updateWrongCount(); }
    async function clearWrongBook() { if (confirm('确定清空？')) { await Storage.clearWrongs(); renderWrongList('all'); app.updateWrongCount(); } }
    
    async function renderHistory() {
        const r = await Storage._client.query('practice_history', { eq: { user_id: Storage.getUid() }, order: { column: 'created_at', ascending: false } });
        const c = document.getElementById('history-list');
        if (!r.data || r.data.length === 0) { c.innerHTML = '<div class="empty-tip">暂无记录</div>'; return; }
        c.innerHTML = r.data.map(h => '<div class="history-item"><div class="history-header"><span>' + h.created_at.split('T')[0] + '</span><span>七年级' + (h.semester === 'upper' ? '上' : '下') + '册</span></div><div class="history-stats"><span>' + h.total_questions + '题</span><span>' + h.correct_count + '对</span><span>' + h.accuracy + '%</span><span>' + Math.floor(h.duration / 60) + '分' + (h.duration % 60) + '秒</span></div></div>').join('');
    }
    
    async function showUserManager() {
        app.showPage('user');
        const users = await Storage.getUsers();
        document.getElementById('user-list').innerHTML = users.map(u => '<div class="user-item"><div class="user-info"><div class="user-avatar">👤</div><div class="user-details"><div class="user-name-text">' + u.name + '</div><div class="user-stats">' + (u.total_days || 0) + '天·' + (u.total_questions || 0) + '题</div></div></div><div class="user-actions">' + (u.id === Storage.getUid() ? '<span class="user-current-badge">当前</span>' : '<button class="user-btn switch" onclick="Storage.setUid(\'' + u.id + '\');location.reload()">切换</button>') + '<button class="user-btn delete" onclick="Storage.deleteUser(\'' + u.id + '\');location.reload()">删除</button></div></div>').join('');
    }
    
    async function addUser() {
        const input = document.getElementById('new-username');
        if (!input.value.trim()) return alert('输入用户名');
        await Storage.createUser(input.value.trim());
        input.value = '';
        await app.checkUser();
        await app.updateStats();
        showUserManager();
    }
    
    function showPage(p) { app.showPage(p); }
    function startPractice() { app.startPractice(); }
    
    async function handleAvatarUpload(input) {
        const file = input.files[0];
        if (!file) return;
        app.selectedAvatarFile = file;
        const preview = document.getElementById('avatar-preview');
        const placeholder = document.getElementById('avatar-placeholder');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        placeholder.style.display = 'none';
        document.getElementById('upload-status').textContent = '已选择：' + file.name;
    }
    
    async function uploadAvatar() {
        if (!app.selectedAvatarFile) return alert('请先选择图片');
        const uid = Storage.getUid();
        if (!uid) return alert('请先登录');
        document.getElementById('upload-status').textContent = '⏳ 上传中...';
        console.log('Starting upload for user:', uid, 'File:', app.selectedAvatarFile);
        try {
            const url = await Storage.uploadAvatar(app.selectedAvatarFile, uid);
            console.log('Upload success:', url);
            document.getElementById('upload-status').textContent = '✅ 上传成功！';
            document.getElementById('avatar-preview').src = url;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('avatar-placeholder').style.display = 'none';
            document.getElementById('current-user-avatar').src = url;
            document.getElementById('current-user-avatar').style.display = 'inline-block';
            document.getElementById('current-user-icon').style.display = 'none';
            app.selectedAvatarFile = null;
            setTimeout(() => showUserManager(), 500);
        } catch (e) {
            console.error('Avatar upload error:', e);
            document.getElementById('upload-status').textContent = '❌ 上传失败：' + e.message;
        }
    }
    
    async function removeAvatar() {
        const uid = Storage.getUid();
        if (!uid) return alert('请先登录');
        if (!confirm('确定删除头像？')) return;
        try {
            await Storage.removeAvatar(uid);
            document.getElementById('avatar-preview').style.display = 'none';
            document.getElementById('avatar-placeholder').style.display = 'block';
            document.getElementById('current-user-avatar').style.display = 'none';
            document.getElementById('current-user-icon').style.display = 'inline-block';
            document.getElementById('upload-status').textContent = '✅ 头像已删除';
            showUserManager();
        } catch (e) {
            document.getElementById('upload-status').textContent = '❌ 删除失败：' + e.message;
        }
    }
    
    async function showUserManager() {
        app.showPage('user');
        const users = await Storage.getUsers();
        const uid = Storage.getUid();
        const currentUser = users.find(u => u.id === uid);
        document.getElementById('upload-username').textContent = currentUser ? currentUser.name : '未登录';
        if (currentUser && currentUser.avatar_url) {
            document.getElementById('avatar-preview').src = currentUser.avatar_url;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('avatar-placeholder').style.display = 'none';
        } else {
            document.getElementById('avatar-preview').style.display = 'none';
            document.getElementById('avatar-placeholder').style.display = 'block';
        }
        document.getElementById('user-list').innerHTML = users.map(u => '<div class="user-item"><div class="user-info"><img class="user-avatar-small" src="' + (u.avatar_url || '') + '" style="width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:12px;' + (u.avatar_url ? '' : 'display:none;') + '" /><div class="user-avatar">' + (u.avatar_url ? '' : '👤') + '</div><div class="user-details"><div class="user-name-text">' + u.name + '</div><div class="user-stats">' + (u.total_days || 0) + '天·' + (u.total_questions || 0) + '题</div></div></div><div class="user-actions">' + (u.id === uid ? '<span class="user-current-badge">当前</span>' : '<button class="user-btn switch" onclick="Storage.setUid(\'' + u.id + '\');location.reload()">切换</button>') + '<button class="user-btn delete" onclick="Storage.deleteUser(\'' + u.id + '\');location.reload()">删除</button></div></div>').join('');
    }
    
    window.addEventListener('load', () => app.init());
    </script>
</body>
</html>
