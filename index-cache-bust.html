<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题应用 - 强制刷新版</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/user.css">
    <style>
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-content {
            text-align: center;
            color: #fff;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-content">
            <div class="spinner"></div>
            <div style="font-size: 18px; margin-bottom: 10px;">🚀 加载中...</div>
            <div id="status" style="font-size: 14px; opacity: 0.8;">正在初始化</div>
        </div>
    </div>

    <div id="app"></div>

    <!-- 按顺序加载脚本，带版本控制 -->
    <script src="config.js?t=3"></script>
    <script src="js/supabase-client.js?t=3"></script>
    <script src="js/storage-sync.js?t=3"></script>
    <script src="js/data.js?t=3"></script>
    <script src="js/grade7-lower.js?t=3"></script>
    <script src="js/app-new.js?t=3"></script>
    
    <script>
        // 页面加载完成后移除 loading
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.transition = 'opacity 0.5s';
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 500);
                }
            }, 500);
        });
    </script>
</body>
</html>
